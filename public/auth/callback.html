<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Between Books — Signing in...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0C0B09;
      color: #E8E2D8;
      font-family: 'Outfit', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 400px;
    }
    .card h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 12px;
    }
    .card p {
      color: #A69E90;
      font-size: 0.95rem;
      font-weight: 300;
      line-height: 1.6;
    }
    .dots {
      display: inline-flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #D4A054;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.22s; }
    .dot:nth-child(3) { animation-delay: 0.44s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
    .error { color: #C46B5E; display: none; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <h1>Signing you in...</h1>
    <p>Just a moment while we set things up.</p>
    <p class="error" id="error"></p>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    async function handleCallback() {
      const errorEl = document.getElementById('error');

      try {
        // Fetch config from server
        const configRes = await fetch('/api/config');
        const { supabaseUrl, supabaseAnonKey } = await configRes.json();
        const sb = createClient(supabaseUrl, supabaseAnonKey);

        // Check for PKCE code in query params
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');

        // Check for implicit flow tokens in hash fragment
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');

        let session = null;

        if (code) {
          // PKCE flow — exchange code for session
          const { data, error } = await sb.auth.exchangeCodeForSession(code);
          if (error) throw error;
          session = data.session;
        } else if (accessToken) {
          // Implicit flow — set session from hash tokens
          const { data, error } = await sb.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken,
          });
          if (error) throw error;
          session = data.session;
        } else {
          // No auth params — check if session already exists
          const { data: { session: existing } } = await sb.auth.getSession();
          if (existing) {
            window.location.href = '/';
            return;
          }
          throw new Error('No authentication credentials found in URL');
        }

        const newUserId = session?.user?.id;
        const oldUserId = localStorage.getItem('betweenbooks_old_anon_id');

        // Merge anonymous data if we have a different old ID
        if (oldUserId && newUserId && oldUserId !== newUserId) {
          try {
            await fetch('/api/auth/merge', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${session.access_token}`,
              },
              body: JSON.stringify({ oldUserId }),
            });
          } catch {
            // Merge failure is non-fatal — user still gets signed in
          }
          localStorage.removeItem('betweenbooks_old_anon_id');
        }

        // Redirect home
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = err.message || 'Something went wrong. Please try again.';
        errorEl.style.display = 'block';
        setTimeout(() => { window.location.href = '/'; }, 3000);
      }
    }

    handleCallback();
  </script>
</body>
</html>
